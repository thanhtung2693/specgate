name: agents
on:
  push:
    branches: ["main"]
    paths: ["app/agents/**", ".github/workflows/agents.yml"]
  pull_request:
    paths: ["app/agents/**", ".github/workflows/agents.yml"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/agents
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: uv --version
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run deptry src evals
      - run: uv run pytest
