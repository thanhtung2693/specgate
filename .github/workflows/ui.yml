name: ui
on:
  push:
    branches: ["main"]
    paths: ["app/ui/**", ".github/workflows/ui.yml"]
  pull_request:
    paths: ["app/ui/**", ".github/workflows/ui.yml"]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/ui
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: app/ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test
