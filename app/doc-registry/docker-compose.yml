services:
  redis:
    image: redis:8-alpine
    container_name: doc-registry-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - ./.redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: doc-registry-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-specgate-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-specgate-minio-dev-only}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.minio-data:/data
    healthcheck:
      # If this fails on your image (no curl), remove healthcheck or use a TCP check.
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
