worker_processes auto;
pid /tmp/specgate-nginx/nginx.pid;
error_log stderr warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log off;
  sendfile on;

  client_body_temp_path /tmp/specgate-nginx/client_body;
  proxy_temp_path /tmp/specgate-nginx/proxy;
  fastcgi_temp_path /tmp/specgate-nginx/fastcgi;
  uwsgi_temp_path /tmp/specgate-nginx/uwsgi;
  scgi_temp_path /tmp/specgate-nginx/scgi;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
      access_log off;
      proxy_pass http://127.0.0.1:9090;
    }

    location = /healthz/components {
      access_log off;
      proxy_pass http://127.0.0.1:9090;
    }

    # CLI uses /api/doc-registry as its base URL. Keep diagnostics reachable
    # from that base without teaching the client how to infer a gateway origin.
    location = /api/doc-registry/healthz/components {
      access_log off;
      proxy_pass http://127.0.0.1:9090/healthz/components;
    }

    location = /api/doc-registry {
      return 308 /api/doc-registry/;
    }

    location ^~ /api/doc-registry/ {
      # Backend defaults accept 10 MiB Knowledge files and 25 MiB governance
      # files. Allow multipart/request overhead here; backend handlers still
      # enforce their endpoint-specific limits.
      client_max_body_size 32m;
      proxy_pass http://127.0.0.1:8080/;
      proxy_http_version 1.1;
      # Preserve the configurable host port for generated callbacks and links.
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-SpecGate-Internal-Agent "";
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }

    # Provider redirect and delivery URLs are generated from the public origin
    # and use Doc Registry's native paths. Route only those callbacks at root;
    # normal browser and CLI API traffic stays under /api/doc-registry/.
    location = /integrations/oauth-callback {
      proxy_pass http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-SpecGate-Internal-Agent "";
      proxy_buffering off;
    }

    location ~ ^/integrations/[^/]+/resources/[^/]+/(github|gitlab|linear)/webhook$ {
      client_max_body_size 32m;
      proxy_pass http://127.0.0.1:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-SpecGate-Internal-Agent "";
      proxy_buffering off;
    }

    location = /api/agents {
      return 308 /api/agents/;
    }

    location /api/agents/ {
      proxy_pass http://127.0.0.1:2024/;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }

    location ~* \.(?:css|js|mjs|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
